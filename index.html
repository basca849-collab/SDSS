        <style>
        /* Google Fonts loaded via preload in <head> for performance */

        :root {
            --primary: #D4AF37;
            --primary-light: #FFD700;
            --secondary: #8B0000;
            --accent: #FEDB00;
            --divine-white: #FFF8E7;
            --nav-top-h: 140px;
            --nav-bot-h: 56px;
            /* Slightly taller for premium feel */
            --nav-h: 196px;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --radius-lg: 32px;
            --radius-md: 20px;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            scroll-behavior: smooth;
            transition: background-color 0.3s ease, border-color 0.3s ease, transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
            /* Ultra HD Quality Rendering & Cross-Platform Flexibility */
            image-rendering: -webkit-optimize-contrast;
            image-rendering: high-quality;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html,
        body {
            margin: 0 !important;
            padding: 0 !important;
            overflow-x: hidden;
            width: 100%;
            background-color: #000000;
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #333;
            /* Edge-to-edge layout */
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .sdss-app-wrapper {
            background: linear-gradient(135deg, #ffffff 0%, #faf9f6 100%);
            width: 100%;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            position: relative;
            z-index: 10;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .sdss-app-wrapper::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.6;
            z-index: -1;
            pointer-events: none;
        }

        h1,
        h2,
        h3,
        .font-serif {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.08em;
        }

        .font-italic {
            font-family: 'Playfair Display', serif;
        }

        .font-telugu {
            font-family: 'Dhurjati', 'Noto Sans Telugu', sans-serif;
        }

        /* ── Navbar Layout (Non-fixed, scrolls with page) ── */
        .sdss-nav {
            background: rgba(5, 5, 5, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .sdss-nav-logo-row {
            display: flex;
            align-items: center;
            justify-content: center;
            height: var(--nav-top-h);
            background: linear-gradient(to right, #FEDB00, #FCD000);
            padding: 10px;
            position: relative;
            border-bottom: 2px solid #FFFFFF;
            box-shadow: inset 0 -4px 10px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .sdss-nav-logo-row::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
            pointer-events: none;
        }

        /* Clean logo container */
        .sdss-logo-ring {
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .sdss-logo-ring:hover {
            transform: scale(1.08) rotate(2deg);
        }

        @keyframes marquee {
            0% {
                transform: translateX(0%);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .animate-marquee {
            display: inline-block;
            animation: marquee 30s linear infinite;
        }

        /* Row 2: Tabs + Donate */
        .sdss-nav-tabs-row {
            height: var(--nav-bot-h);
            background: rgba(255, 255, 255, 0.85);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            backdrop-filter: blur(25px) saturate(200%);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            position: relative;
        }

        .sdss-tabs-strip {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            flex-grow: 1;
            overflow-x: auto;
            -ms-overflow-style: none;
            gap: 4px;
        }

        @supports (scrollbar-width: none) {
            .sdss-tabs-strip {
                scrollbar-width: none;
            }
        }

        .sdss-tabs-strip::-webkit-scrollbar {
            display: none;
        }

        .sdss-tab {
            white-space: nowrap;
            padding: 8px 22px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            border-radius: 8px;
            color: rgba(0, 0, 0, 0.6);
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
            border: 1px solid transparent;
        }

        .sdss-tab:hover {
            color: #000;
            background: rgba(0, 0, 0, 0.08);
            transform: translateY(-1px);
        }

        .sdss-tab.active {
            color: #8B0000;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.3), 0 4px 12px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        @keyframes donateGlow {
            0% { box-shadow: 0 0 15px rgba(255,255,255,0.5), inset 0 0 10px rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.6); }
            50% { box-shadow: 0 0 35px rgba(255,255,255,1), 0 0 15px rgba(255,255,255,0.8), inset 0 0 25px rgba(255,255,255,0.9); border-color: rgba(255,255,255,1); }
            100% { box-shadow: 0 0 15px rgba(255,255,255,0.5), inset 0 0 10px rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.6); }
        }

        .sdss-donate-btn {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 24px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.1));
            color: #8B0000;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            border-radius: 8px;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: all 0.4s ease;
            animation: donateGlow 2s ease-in-out infinite alternate;
        }

        .sdss-donate-btn:hover {
            transform: scale(1.05) translateY(-2px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.2));
            box-shadow: 0 0 45px rgba(255, 255, 255, 1), inset 0 0 30px rgba(255, 255, 255, 0.9);
            border-color: rgba(255, 255, 255, 1);
            color: #ffffff;
            animation: none;
        }

        /* Mobile hamburger */
        .sdss-hamburger {
            display: none;
            background: none;
            border: none;
            color: #fff;
            cursor: pointer;
            padding: 4px;
            flex-shrink: 0;
        }

        @media (max-width: 480px) {
            :root {
                --nav-top-h: 72px;
                --nav-bot-h: 44px;
                --nav-h: 116px;
            }

            .sdss-tab {
                font-size: 10px;
                padding: 4px 10px;
            }

            .sdss-donate-btn span {
                display: none;
            }
        }

        /* Mobile drawer */
        .sdss-mobile-drawer {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 20px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            background: rgba(5, 5, 5, 0.96);
        }

        .sdss-mobile-drawer.open {
            display: flex;
        }

        .sdss-mobile-drawer a {
            color: rgba(255, 255, 255, 0.75);
            font-weight: 800;
            font-size: 13px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            text-decoration: none;
        }

        .sdss-mobile-drawer a:hover {
            color: #FEDB00;
        }

        /* Page body - no offset needed */
        .sdss-main-content {
            padding-top: 0;
        }

        /* ── Thumbnail / Image Containers — Premium Dark ── */
        .img-thumb {
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-radius: 16px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        }

        .img-thumb img,
        .img-thumb video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
            transition: transform 0.7s ease;
            filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.5));
        }

        .img-thumb:hover img {
            transform: scale(1.05);
        }

        /* Gallery grid item: premium dark with golden accents */
        .gallery-item {
            overflow: hidden;
            border-radius: 20px;
            background: radial-gradient(ellipse at center, #0a0a0a 0%, #050505 100%);
            height: 280px;
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(212, 175, 55, 0.12);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.03);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gallery-item:hover {
            border-color: rgba(212, 175, 55, 0.35);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.7), 0 0 30px rgba(212, 175, 55, 0.08);
            transform: translateY(-4px);
        }

        .gallery-item.tall {
            height: 420px;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            display: block;
            transition: transform 0.7s ease, brightness 0.3s ease;
            filter: drop-shadow(0 2px 15px rgba(0, 0, 0, 0.4));
        }

        .gallery-item:hover img {
            transform: scale(1.06);
            filter: brightness(1.08) drop-shadow(0 4px 25px rgba(0, 0, 0, 0.5));
        }

        @media (max-width: 640px) {

            .gallery-item,
            .gallery-item.tall {
                height: 180px;
            }
        }

        /* ── Premium Glass ── */
        .premium-glass {
            background: rgba(255, 255, 255, 0.1);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            backdrop-filter: blur(25px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.2);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            -webkit-backdrop-filter: blur(15px);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border-radius: var(--radius-md);
        }

        .text-gradient {
            background: linear-gradient(to right, #D4AF37, #FFD700, #FDF5E6);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .divine-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .divine-scroll::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .divine-scroll::-webkit-scrollbar-thumb {
            background: var(--secondary);
            border-radius: 10px;
        }

        .gold-glow {
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.6);
        }

        .shimmer {
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
            background-size: 200% 100%;
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        /* Logo image */
        .sdss-logo-img {
            display: block;
            object-fit: contain;
            object-position: center;
            image-rendering: -webkit-optimize-contrast;
        }

        /* Premium header org name */
        .sdss-org-name {
            font-family: 'Dhurjati', 'Noto Sans Telugu', sans-serif;
            font-weight: 900;
            text-align: center;
            line-height: 1.1;
            letter-spacing: 0.02em;
            background: linear-gradient(135deg, #FFD700 0%, #FEDB00 25%, #FFF8DC 50%, #FEDB00 75%, #D4AF37 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.3));
            animation: shine 5s linear infinite;
            text-decoration: none;
            display: block;
            transition: all 0.5s ease;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }

        .sdss-org-name:hover {
            filter: drop-shadow(0 8px 25px rgba(255, 215, 0, 0.4)) drop-shadow(0 4px 10px rgba(0, 0, 0, 0.4));
            transform: scale(1.01);
        }

        .sdss-org-subtitle {
            font-family: 'Dhurjati', 'Noto Sans Telugu', sans-serif;
            font-weight: 700;
            color: rgba(255, 215, 0, 0.5);
            letter-spacing: 0.25em;
            text-align: center;
            display: block;
            margin-top: 2px;
        }

        /* Responsive utility */
        @media (max-width: 768px) {
            h1 {
                font-size: clamp(2rem, 8vw, 4rem) !important;
            }

            .section-hero {
                padding: 48px 16px !important;
            }

            /* Premium Mobile View Fixes */
            .sdss-nav-tabs-row {
                display: none !important;
            }

            .mobile-hamburger-btn {
                display: flex !important;
                position: absolute;
                left: 16px;
                top: 50%;
                transform: translateY(-50%);
                color: #8B0000;
                padding: 8px 12px;
                border-radius: 8px;
                z-index: 100;
                align-items: center;
                justify-content: center;
                background: rgba(0,0,0,0.05);
                border: none;
                cursor: pointer;
            }
        }

        .mobile-hamburger-btn {
            display: none;
        }

        /* Hero Section Responsive Landscape View */
        .hero-section-wrapper {
            height: 100vh;
        }

        @media (max-width: 768px) {
            .hero-section-wrapper {
                height: auto !important;
                aspect-ratio: 16 / 9;
                min-height: 250px;
                max-height: 400px;
            }
        }

        /* Uiverse 3D Dynamic Elements */
        .uiverse-btn {
            appearance: none;
            background-color: transparent;
            border: 0.125em solid #1A1A1A;
            border-radius: 0.9375em;
            box-sizing: border-box;
            color: #3B3B3B;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-family: inherit;
            font-size: 16px;
            font-weight: 800;
            line-height: normal;
            margin: 0;
            min-height: 3.75em;
            min-width: 0;
            outline: none;
            padding: 1em 2.3em;
            text-align: center;
            text-decoration: none;
            transition: all 300ms cubic-bezier(.23, 1, 0.32, 1);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            will-change: transform;
            background-image: linear-gradient(144deg,#D4AF37, #FFD700 50%,#FAC802);
            box-shadow: rgba(212, 175, 55, .2) 0 15px 30px -5px;
            gap: 10px;
        }

        .uiverse-btn:hover {
            color: #111;
            transform: translateY(-2px);
            box-shadow: rgba(212, 175, 55, .5) 0 20px 40px -5px;
        }

        .uiverse-btn:active {
            box-shadow: none;
            transform: translateY(2px);
        }

        .uiverse-btn-premium {
            background-image: linear-gradient(144deg,#8B0000, #ff1a1a 50%,#8B0000);
            border: 0;
            border-radius: 12px;
            box-shadow: rgba(139, 0, 0, 0.2) 0 15px 30px -5px;
            box-sizing: border-box;
            color: #FFFFFF;
            display: flex;
            font-family: inherit;
            font-size: 16px;
            justify-content: center;
            line-height: 1em;
            max-width: 100%;
            min-width: 140px;
            padding: 3px;
            text-decoration: none;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            white-space: nowrap;
            cursor: pointer;
            transition: all .3s;
        }

        .uiverse-btn-premium span {
            background-color: rgb(15, 15, 15);
            padding: 16px 24px;
            border-radius: 9px;
            width: 100%;
            height: 100%;
            transition: 300ms;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
        }

        .uiverse-btn-premium:hover span {
            background: none;
            color: white;
        }

        .uiverse-btn-premium:active {
            transform: scale(0.95);
        }

        /* 3D Glass Card */
        .uiverse-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transform-style: preserve-3d;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
        }

        .uiverse-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 24px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
            pointer-events: none;
        }

        .uiverse-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.2);
            border-color: rgba(250, 200, 2, 0.3);
        }

        /* Input Neo */
        .uiverse-input {
            width: 100%;
            background-color: #1a1a1a;
            border: 2px solid transparent;
            border-radius: 16px;
            color: white;
            padding: 18px 20px;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 5px 5px 10px #0a0a0a, inset -5px -5px 10px #2a2a2a;
            font-family: inherit;
        }

        .uiverse-input:focus {
            border-color: #FAC802;
            box-shadow: 0 0 20px rgba(250, 200, 2, 0.2), inset 2px 2px 5px #0a0a0a, inset -2px -2px 5px #2a2a2a;
            transform: translateY(-2px);
        }

        /* Custom SVG Checkbox */
        .uiverse-checkbox-container {
            display: flex;
            align-items: center;
            position: relative;
            cursor: pointer;
            font-size: 14px;
            user-select: none;
            color: #aaa;
            gap: 12px;
            transition: color 0.3s;
        }

        .uiverse-checkbox-container:hover {
            color: white;
        }

        .uiverse-checkbox-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .uiverse-checkbox-checkmark {
            height: 28px;
            width: 28px;
            background-color: #111;
            border: 2px solid #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: inset 2px 2px 5px #050505, inset -2px -2px 5px #1a1a1a;
            flex-shrink: 0;
        }

        .uiverse-checkbox-container:hover input ~ .uiverse-checkbox-checkmark {
            border-color: #555;
        }

        .uiverse-checkbox-container input:checked ~ .uiverse-checkbox-checkmark {
            background-color: #FAC802;
            border-color: #FAC802;
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 15px rgba(250, 200, 2, 0.4);
        }

        .uiverse-checkbox-checkmark::after {
            content: "";
            display: none;
            width: 6px;
            height: 12px;
            border: solid black;
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        .uiverse-checkbox-container input:checked ~ .uiverse-checkbox-checkmark::after {
            display: block;
            animation: checkAnim 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        @keyframes checkAnim {
            0% { transform: rotate(45deg) scale(0); opacity: 0; }
            100% { transform: rotate(45deg) scale(1); opacity: 1; }
        }
    </style>
